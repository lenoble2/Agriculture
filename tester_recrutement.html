<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Complet de Recrutement</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; background-color: #f4f7f6; font-size: 14px; }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .logo { width: 60px; height: auto; border-radius: 8px; }

        /* Style des sections */
        fieldset { border: 1px solid #2e7d32; border-radius: 5px; padding: 10px; margin-bottom: 15px; background: white; }
        legend { background-color: #2e7d32; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }

        .form-group { display: flex; align-items: center; margin-bottom: 10px; }
        label { width: 40%; font-size: 0.85em; color: #333; }
        input { width: 60%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }

        #message { margin-top: 10px; text-align: center; font-weight: bold; padding: 10px; border-radius: 6px; }
        .success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="header">
        <img src="eagri.jpg" alt="Logo" class="logo">
        <div>
            <h2>Recrutement</h2>
            <p id="affichage-recruteur" style="margin:0; font-size: 0.9em; color: #2e7d32; font-weight: bold;"></p>
        </div>
    </div>

    <form id="recrutementForm">
        <input type="hidden" name="num_recruteur" id="hidden-recruteur">

        <!-- Section Identification -->
        <fieldset>
            <legend>Identification</legend>
            <div class="form-group"><label>ID Marché :</label><input type="number" name="marche_id" required></div>
            <div class="form-group"><label>Nom & Prénoms :</label><input type="text" name="nom_prenoms" required></div>
            <div class="form-group"><label>N° CNI :</label><input type="text" name="cni"></div>
            <div class="form-group"><label>Téléphone :</label><input type="text" name="tel"></div>
            <div class="form-group"><label>Localité :</label><input type="text" name="localite"></div>
            <div class="form-group"><label>Lieu de résidence :</label><input type="text" name="residence"></div>
            <div class="form-group"><label>Situation matrimoniale :</label><input type="text" name="situation_matrimoniale"></div>
            <div class="form-group"><label>Coordonnées GPS :</label><input type="text" name="gps"></div>
            <div class="form-group"><label>Nationalité :</label><input type="text" name="nationalite"></div>
            <div class="form-group"><label>Langue parlée :</label><input type="text" name="langue"></div>
            <div class="form-group"><label>Photo CNI Recto :</label><input type="file" name="cni_file" accept="image/*"></div>
            <div class="form-group"><label>Photo CNI Verso :</label><input type="file" name="cni_verso" accept="image/*"></div>
            <div class="form-group"><label>Photo Identité :</label><input type="file" name="photo_id" accept="image/*"></div>
        </fieldset>

        <!-- Section Production -->
        <fieldset>
            <legend>Informations Production</legend>
            <div class="form-group"><label>Spéculation :</label><input type="text" name="speculation"></div>
            <div class="form-group"><label>Variété :</label><input type="text" name="variete"></div>
            <div class="form-group"><label>Années d'expérience :</label><input type="number" name="experience"></div>
            <div class="form-group"><label>Dimension :</label><input type="text" name="dimension"></div>
            <div class="form-group"><label>Début Prod :</label><input type="date" name="debut_prod"></div>
            <div class="form-group"><label>Fin Prod :</label><input type="date" name="fin_prod"></div>
            <div class="form-group"><label>Estimation (T) :</label><input type="number" step="0.01" name="estimation"></div>
        </fieldset>

        <button type="submit">Enregistrer le client</button>
    </form>

    <div id="message"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const telRecruteur = params.get('recruteur');

        if (telRecruteur) {
            // Remplit le champ caché pour l'envoi vers l'API
            document.getElementById('hidden-recruteur').value = telRecruteur;
            // Affiche le numéro dans l'en-tête
            document.getElementById('affichage-recruteur').innerText = "Recruteur : " + telRecruteur;
        }

        document.getElementById('recrutementForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/api/recruter-client', { method: 'POST', body: formData });
            const result = await response.json();
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = result.message || result.error;
            msgDiv.className = response.status === 201 ? 'success' : 'error';
        };
    </script>
</body>
</html>
