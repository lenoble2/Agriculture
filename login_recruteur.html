<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Recruteur</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        .logo { width: 120px; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background 0.3s; 
        }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="eagri.jpg" alt="Logo e-agri" class="logo">
        <h2>Accès Recruteur</h2>
        
        <input type="text" id="tel" placeholder="Numéro de téléphone">
        <input type="password" id="code" placeholder="Code secret">
        
        <button onclick="seConnecter()">Se connecter</button>
    </div>

    <script>
        function seConnecter() {
            const tel = document.getElementById('tel').value;
            const code = document.getElementById('code').value;

            fetch('/api/connexion-recruteur', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tel, code })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    window.location.href = 'tester_recrutement.html?recruteur=' + tel;
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                alert("Erreur de connexion au serveur.");
            });
        }
    </script>
</body>
</html>
