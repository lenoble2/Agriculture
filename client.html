<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Clients - Marché</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background-color: #ffffff; border-radius: 10px; border-bottom: 3px solid #27ae60; }
        .logo-header { width: 120px; display: block; }          
        h1 { color: #2c3e50; text-align: center; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; background: white; padding: 10px; border-radius: 5px; }                                             
        .client-table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .client-table th { background-color: #1e8449; color: #fff; padding: 15px; text-align: left; font-size: 1em; border: 1px solid #ddd; }
        .client-table td { padding: 12px; border: 1px solid #ddd; font-size: 0.95em; }
        .btn-retour { background: #95a5a6; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-bottom: 10px; }                                              
        .btn-delete { color: red; font-weight: bold; cursor: pointer; border: none; background: none; font-size: 1.2em; }                                                   
    </style>
</head>
<body>
    <div class="header-container">
        <img src="eagri.jpg" alt="Logo e-agri" class="logo-header">
    </div>
    <button class="btn-retour" onclick="window.history.back()">Retour</button>

    <h1>Liste des Clients du Marché</h1>                
    <div class="table-container">
        <table class="client-table" id="table-clients">
            <thead>
                <tr>
                    <th>Sel.</th>
                    <th>Nom & Prénoms</th>
                    <th>N° CNI</th>
                    <th>N° Tel</th>
                    <th>Localité</th>
                    <th>CNI (Recto/Verso)</th>
                    <th>Variété de culturel</th>
                    <th>Dim. champs</th>
                    <th>Debut Prodt</th>
                    <th>Fin Prodt</th>
                    <th>Estim (tonnes)</th>
                    <th>N° recruteur</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Les données seront injectées ici par JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const marcheId = params.get('marche_id');

        // Fonction pour formater la date ISO en JJ/MM/AAAA
        function formaterDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR');
        }

        function chargerClients() {
            if (!marcheId) return;
            fetch(`/api/clients?marche_id=${marcheId}`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector('#table-clients tbody');
                    tbody.innerHTML = '';
                    data.forEach(client => {
                        tbody.innerHTML += `
                            <tr>
                                <td><input type="checkbox" class="select-client"></td>
                                <td>${client.nom_prenoms}</td>
                                <td>${client.cni}</td>
                                <td>${client.tel}</td>
                                <td>${client.localite}</td>
                                <td><a href="${client.cni_file}" target="_blank">Voir</a></td>
                                <td>${client.variete}</td>
                                <td>${client.dimension}</td>
                                <td>${formaterDate(client.debut_prod)}</td>
                                <td>${formaterDate(client.fin_prod)}</td>
                                <td>${client.estimation}</td>
                                <td>${client.num_recruteur}</td>
                                <td><button class="btn-delete" onclick="supprimerClient(${client.id})">&times;</button></td>
                            </tr>
                        `;
                    });
                });
        }

        function supprimerClient(id) {
            if (confirm("Voulez-vous vraiment supprimer ce client ?")) {
                fetch(`/api/clients/supprimer/${id}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        chargerClients(); // Recharge la liste
                    })
                    .catch(err => console.error("Erreur:", err));
            }
        }

        chargerClients();
    </script>
</body>
</html>
